<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This is the Master Switch for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Business</title>
    <!-- This links to your new master style file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>Sovereign Intelligence Dashboard</h1>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Search by name, URL, or issue...">
        <select id="categoryFilter">
            <option value="All">All Statuses</option>
            <option value="Hot Prospect">Hot Prospects Only</option>
            <option value="Cold">Cold Leads Only</option>
        </select>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Business Name</th>
                    <th>Score</th>
                    <th>Status</th>
                    <th>Identified Issues</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="dataGrid">
                <!-- Data will be injected here by JavaScript -->
            </tbody>
        </table>
    </div>

    <script src="app.js">
        
    </script>
</body>
</html>
